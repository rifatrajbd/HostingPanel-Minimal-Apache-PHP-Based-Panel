; PHP-FPM pool for the HostingPanel UI itself (runs as the hostingpanel user).
[hostingpanel]
user = hostingpanel
group = hostingpanel

listen = /run/php/hostingpanel.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 5
pm.process_idle_timeout = 30s

php_admin_value[error_log] = /var/log/hostingpanel/php-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 128M
php_admin_flag[expose_php] = off
php_admin_value[env[PANEL_ENV]] = production
env[PANEL_ENV] = production

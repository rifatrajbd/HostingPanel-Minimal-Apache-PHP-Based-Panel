# HostingPanel admin UI — served on its own port with its own certificate.
# (Run `panelctl panel:domain --domain panel.example.com` for a real cert.)
Listen 8443
<VirtualHost *:8443>
    ServerName hostingpanel
    DocumentRoot /opt/hostingpanel/web/public

    SSLEngine on
    SSLCertificateFile /etc/hostingpanel/ssl/panel.crt
    SSLCertificateKeyFile /etc/hostingpanel/ssl/panel.key
    SSLProtocol -all +TLSv1.2 +TLSv1.3

    <Directory /opt/hostingpanel/web/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Optional IP allowlist (panelctl panel:access). Removed = open to all.
        IncludeOptional /etc/hostingpanel/panel-access.conf

        # Laravel front controller
        RewriteEngine On
        RewriteRule ^(.*)/$ /$1 [L,R=301]
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [L]
    </Directory>

    Alias /phpmyadmin /opt/hostingpanel/phpmyadmin
    <Directory /opt/hostingpanel/phpmyadmin>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    Alias /webmail /opt/hostingpanel/webmail
    <Directory /opt/hostingpanel/webmail>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/hostingpanel.sock|fcgi://localhost"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/hostingpanel-error.log
    CustomLog ${APACHE_LOG_DIR}/hostingpanel-access.log combined
</VirtualHost>

# HostingPanel Dovecot configuration (included last, overrides defaults).
# Virtual mailboxes in /var/vmail, users/passwords from the mailserver DB.

mail_location = maildir:/var/vmail/%d/%n
mail_privileged_group = mail
first_valid_uid = 5000
last_valid_uid = 5000

auth_mechanisms = plain login
disable_plaintext_auth = yes

passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/vmail/%d/%n
}

# Postfix delivers via LMTP and authenticates SMTP users via this socket
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
}

ssl = required
ssl_cert = </etc/hostingpanel/ssl/mail.crt
ssl_key = </etc/hostingpanel/ssl/mail.key
ssl_min_protocol = TLSv1.2
